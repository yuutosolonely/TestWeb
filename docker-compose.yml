services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: note_app_web
    restart: always
    ports:
      - "8000:80"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: note_db
      DB_USERNAME: admin
      DB_PASSWORD: password123
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - db
      - redis
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules

  db:
    image: postgres:15-alpine
    container_name: note_app_db
    restart: always
    environment:
      POSTGRES_DB: note_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: note_app_redis
    restart: always
    ports:
      - "6379:6379"

  websocket:
    build: .
    container_name: note_app_ws
    restart: always
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: note_db
      DB_USERNAME: admin
      DB_PASSWORD: password123
      REDIS_HOST: redis
    depends_on:
      - app
    entrypoint: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "8080:8080"

volumes:
  postgres_data:
